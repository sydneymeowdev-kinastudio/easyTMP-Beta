<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>EasyTMP-ระบบจัดการเงิน By Kina Studio</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-tap-highlight-color:transparent;}
body{font-family:'Prompt',sans-serif;background:#f1f5f9;min-height:100vh;color:#1e293b;-webkit-font-smoothing:antialiased;}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes rowSlide{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastIn{0%{opacity:0;transform:translateY(12px) scale(.96)}15%,80%{opacity:1;transform:none}100%{opacity:0;transform:translateY(-8px) scale(.96)}}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
@keyframes overlayCardIn{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:none}}

/* ── AUTH ── */
.auth-page{
  min-height:100vh;
  background:linear-gradient(145deg,#e8f5e9 0%,#f3e5f5 45%,#e3f2fd 100%);
  display:flex;align-items:center;justify-content:center;padding:1.25rem;
}
.auth-card{
  background:#fff;border-radius:28px;
  box-shadow:0 20px 60px rgba(0,0,0,.13),0 4px 16px rgba(0,0,0,.06);
  padding:2.25rem 2rem;width:100%;max-width:420px;
  animation:fadeUp .45s cubic-bezier(.22,1,.36,1) both;
}
.auth-logo{text-align:center;margin-bottom:1.4rem;}
.auth-logo img{max-width:190px;}
.tab-bar{display:flex;background:#f1f5f9;border-radius:14px;padding:4px;gap:4px;margin-bottom:1.6rem;}
.tab-btn{
  flex:1;padding:.6rem;border:none;background:transparent;
  border-radius:11px;font-family:'Prompt',sans-serif;font-size:.88rem;
  font-weight:500;color:#94a3b8;cursor:pointer;transition:all .2s;
}
.tab-btn.on{background:#fff;color:#15803d;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.1);}

/* ── FIELD ── */
.fg{margin-bottom:.9rem;}
.fl{display:block;font-size:.78rem;font-weight:600;color:#475569;margin-bottom:.35rem;}
.fl-amber{color:#d97706;}
.fi{
  width:100%;padding:.72rem 1rem;border:2px solid #e2e8f0;border-radius:11px;
  font-family:'Prompt',sans-serif;font-size:.88rem;color:#1e293b;
  outline:none;background:#f8fafc;transition:border-color .18s,box-shadow .18s,background .18s;
}
.fi:focus{border-color:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.13);background:#fff;}
.fi-amber:focus{border-color:#f59e0b!important;box-shadow:0 0 0 3px rgba(245,158,11,.13)!important;}
.fhint{font-size:.7rem;color:#94a3b8;margin-top:.25rem;}
.ferr{
  background:#fef2f2;color:#dc2626;border-radius:9px;
  padding:.55rem .85rem;font-size:.78rem;margin-bottom:.75rem;
  border-left:3px solid #dc2626;
}
.sep{border:none;border-top:1px solid #f1f5f9;margin:.85rem 0;}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:.4rem;
  padding:.7rem 1.1rem;border:none;border-radius:11px;
  font-family:'Prompt',sans-serif;font-weight:700;font-size:.87rem;
  cursor:pointer;transition:transform .18s,box-shadow .18s,background .18s;
  white-space:nowrap;
}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important;box-shadow:none!important;}
.btn-w{width:100%;}
.btn-green{background:linear-gradient(135deg,#22c55e,#15803d);color:#fff;}
.btn-green:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 18px rgba(21,128,61,.32);}
.btn-blue{background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;}
.btn-blue:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 18px rgba(29,78,216,.3);}
.btn-violet{background:linear-gradient(135deg,#8b5cf6,#4c1d95);color:#fff;}
.btn-violet:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 18px rgba(76,29,149,.3);}
.btn-amber{background:linear-gradient(135deg,#f59e0b,#b45309);color:#fff;}
.btn-amber:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 18px rgba(180,83,9,.3);}
.btn-red{background:linear-gradient(135deg,#ef4444,#991b1b);color:#fff;}
.btn-red:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 18px rgba(153,27,27,.3);}
.btn-ghost{background:#f1f5f9;color:#475569;border:2px solid #e2e8f0;}
.btn-ghost:hover:not(:disabled){background:#e2e8f0;}
.btn-sm{padding:.42rem .6rem;border-radius:8px;font-size:.8rem;}
.btn-edit{background:#dbeafe;color:#1d4ed8;}
.btn-edit:hover{background:#bfdbfe;}
.btn-del{background:#fee2e2;color:#991b1b;}
.btn-del:hover{background:#fecaca;}
.btn-out{
  padding:.55rem 1.1rem;background:#fff1f2;color:#dc2626;
  border:2px solid #fecdd3;border-radius:10px;
  font-family:'Prompt',sans-serif;font-weight:600;font-size:.83rem;
  cursor:pointer;transition:all .18s;
}
.btn-out:hover{background:#dc2626;color:#fff;border-color:#dc2626;}

/* ── SPINNER ── */
.sp{
  display:inline-block;width:16px;height:16px;flex-shrink:0;
  border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;
  border-radius:50%;animation:spin .6s linear infinite;
}
.sp-dark{border-color:rgba(0,0,0,.1);border-top-color:#475569;}

/* ── SKELETON ── */
.sk{
  background:linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);
  background-size:400px 100%;animation:shimmer 1.2s infinite;border-radius:6px;
}

/* ── TOAST ── */
.toast-wrap{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  z-index:9999;display:flex;flex-direction:column;align-items:center;gap:.4rem;pointer-events:none;
}
.toast{
  padding:.6rem 1.3rem;border-radius:11px;font-size:.83rem;font-weight:600;
  color:#fff;box-shadow:0 8px 24px rgba(0,0,0,.17);
  animation:toastIn 3.1s ease forwards;white-space:nowrap;
}
.t-ok{background:linear-gradient(135deg,#22c55e,#15803d);}
.t-err{background:linear-gradient(135deg,#ef4444,#991b1b);}
.t-info{background:linear-gradient(135deg,#3b82f6,#1d4ed8);}

/* ── MODAL ── */
.modal-bg{
  position:fixed;inset:0;background:rgba(15,23,42,.5);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;padding:1rem;backdrop-filter:blur(5px);
  animation:overlayIn .2s ease both;
}
.modal-box{
  background:#fff;border-radius:22px;padding:1.75rem;
  width:100%;max-width:460px;max-height:92vh;overflow-y:auto;
  box-shadow:0 24px 80px rgba(0,0,0,.22);
  animation:overlayCardIn .28s cubic-bezier(.22,1,.36,1) both;
}
.modal-title{font-size:1.05rem;font-weight:800;color:#0f172a;margin-bottom:1.1rem;}

/* ── LOGIN LOADING OVERLAY ── */
.login-loading{
  position:fixed;inset:0;
  background:rgba(255,255,255,.93);backdrop-filter:blur(6px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9998;animation:overlayIn .2s ease both;gap:1rem;
}
.login-loading img{width:130px;opacity:.85;}
.login-loading p{font-size:.9rem;color:#475569;display:flex;align-items:center;gap:.5rem;}

/* ── PROGRESS BAR ── */
.prog-wrap{height:4px;background:#e2e8f0;border-radius:4px;overflow:hidden;margin-top:.4rem;}
.prog-bar{height:100%;background:linear-gradient(90deg,#22c55e,#3b82f6);border-radius:4px;transition:width .25s ease;}

/* ── FILE DROP ── */
.file-drop{
  display:flex;align-items:center;gap:.6rem;
  border:2px dashed #e2e8f0;border-radius:11px;
  padding:.65rem .9rem;cursor:pointer;transition:all .18s;
  font-size:.8rem;color:#94a3b8;
}
.file-drop:hover{border-color:#22c55e;background:#f0fdf4;color:#15803d;}
.file-drop input{display:none;}

/* ── DASHBOARD ── */
.wrap{max-width:1180px;margin:0 auto;padding:1.25rem;}

.dash-head{
  background:#fff;border-radius:20px;
  box-shadow:0 2px 16px rgba(0,0,0,.06);
  padding:1.2rem 1.6rem;margin-bottom:1.1rem;
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.9rem;
  animation:fadeUp .4s ease both;
}
.co-logo{width:48px;height:48px;border-radius:11px;object-fit:cover;border:2px solid #e2e8f0;flex-shrink:0;}
.co-logo-ph{
  width:48px;height:48px;border-radius:11px;flex-shrink:0;
  background:linear-gradient(135deg,#22c55e,#3b82f6);
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;
}
.head-name{font-size:1.45rem;font-weight:900;color:#0f172a;letter-spacing:-.04em;}
.head-name span{color:#22c55e;font-weight:400;font-size:.83rem;}
.head-co{font-size:.93rem;font-weight:600;color:#15803d;margin-top:.1rem;}
.head-meta{font-size:.7rem;color:#94a3b8;margin-top:.1rem;display:flex;align-items:center;gap:.35rem;flex-wrap:wrap;}
.badge{display:inline-block;padding:.17rem .5rem;border-radius:5px;font-weight:700;font-size:.68rem;}
.badge-amber{background:#fffbeb;color:#d97706;}
.badge-blue{background:#eff6ff;color:#1d4ed8;}
.badge-green{background:#f0fdf4;color:#15803d;}

/* ── SUMMARY ── */
.sum-row{display:grid;grid-template-columns:repeat(3,1fr);gap:.9rem;margin-bottom:1.1rem;animation:fadeUp .4s .05s ease both;}
.sum-card{
  background:#fff;border-radius:16px;padding:1.1rem 1.2rem;
  box-shadow:0 2px 12px rgba(0,0,0,.05);transition:transform .18s,box-shadow .18s;
}
.sum-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.1);}
.sum-lbl{font-size:.68rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.07em;}
.sum-val{font-size:1.4rem;font-weight:800;margin-top:.2rem;}
.c-green{color:#15803d;} .c-red{color:#dc2626;} .c-blue{color:#1d4ed8;}

/* ── GRID ── */
.grid2{display:grid;grid-template-columns:1fr 300px;gap:1.1rem;}
.panel{background:#fff;border-radius:18px;box-shadow:0 2px 14px rgba(0,0,0,.05);padding:1.4rem;}
.panel-title{font-size:.93rem;font-weight:700;color:#0f172a;margin-bottom:.9rem;display:flex;align-items:center;gap:.4rem;}

/* ── TX FORM ── */
.tx-form{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;}
.span2{grid-column:span 2;}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{
  padding:.6rem .85rem;text-align:left;
  font-size:.65rem;font-weight:600;color:#94a3b8;
  text-transform:uppercase;letter-spacing:.07em;
  border-bottom:2px solid #f1f5f9;
}
.tbl td{padding:.75rem .85rem;font-size:.83rem;border-bottom:1px solid #f8fafc;vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:#f8fafc;}
.pill{display:inline-block;padding:.18rem .6rem;border-radius:20px;font-size:.7rem;font-weight:600;}
.p-in{background:#f0fdf4;color:#15803d;}
.p-out{background:#fff1f2;color:#dc2626;}
.thumb{width:32px;height:32px;border-radius:6px;object-fit:cover;cursor:pointer;border:1px solid #e2e8f0;transition:transform .15s;}
.thumb:hover{transform:scale(1.12);}
.date-cell{color:#94a3b8;font-size:.72rem;}
.empty{text-align:center;padding:2.5rem;color:#94a3b8;font-size:.85rem;}

/* ── SLIP PREVIEW ── */
.slip-prev{width:60px;height:60px;border-radius:9px;object-fit:cover;border:2px solid #e2e8f0;cursor:pointer;flex-shrink:0;}

/* ── LOGO ZONE ── */
.logo-zone{
  border:2px dashed #bbf7d0;border-radius:12px;background:#f0fdf4;
  padding:1rem;text-align:center;cursor:pointer;transition:all .18s;
}
.logo-zone:hover{border-color:#22c55e;background:#dcfce7;}
.logo-zone img{width:70px;height:70px;border-radius:10px;object-fit:cover;margin:0 auto .4rem;display:block;}

/* ── MISC ── */
.no-perm{background:#fff7ed;color:#c2410c;padding:.85rem;border-radius:11px;font-size:.78rem;line-height:1.6;border-left:3px solid #f97316;}
.co-id-card{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:1px solid #bbf7d0;border-radius:16px;padding:1.2rem;text-align:center;}
.co-id-num{font-size:2.2rem;font-weight:900;color:#14532d;letter-spacing:.1em;}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:2000;cursor:pointer;animation:overlayIn .18s ease both;}
.lightbox img{max-width:90vw;max-height:88vh;border-radius:10px;animation:scaleIn .2s ease both;}

@media(max-width:860px){.grid2{grid-template-columns:1fr;}.sum-row{grid-template-columns:1fr 1fr 1fr;}}
@media(max-width:560px){
  .wrap{padding:.85rem;}.sum-row{grid-template-columns:1fr;}
  .tx-form{grid-template-columns:1fr;}.span2{grid-column:span 1;}
  .dash-head{padding:1rem 1.1rem;}.head-name{font-size:1.2rem;}
}
</style>
</head>

/* ── upload logo → Supabase Storage 'logos' ── */
async function uploadLogo(file, coId) {
  const ext  = file.name.split('.').pop().toLowerCase();
  const path = `${coId}/logo_${uid()}.${ext}`;
  const { error } = await sb.storage.from('logos').upload(path, file, {
    upsert: true, contentType: file.type,
  });
  if (error) throw new Error(error.message);
  return sb.storage.from('logos').getPublicUrl(path).data.publicUrl;
}

async function delLogo(url) {
  if (!url) return;
  try {
    const marker = '/object/public/logos/';
    const i = url.indexOf(marker);
    if (i < 0) return;
    const path = decodeURIComponent(url.slice(i + marker.length).split('?')[0]);
    await sb.storage.from('logos').remove([path]);
  } catch(e) { console.warn('delLogo:', e.message); }
}

/* ════════════════════════════════════
   TOAST HOOK
════════════════════════════════════ */
function useToast() {
  const [list, setList] = React.useState([]);
  const add = React.useCallback((msg, type='ok') => {
    const id = uid();
    setList(l => [...l, {id,msg,type}]);
    setTimeout(() => setList(l => l.filter(x => x.id !== id)), 3200);
  }, []);
  return { list, add };
}

/* ════════════════════════════════════
   SMALL UI COMPONENTS
════════════════════════════════════ */
function Toast({ list }) {
  return (
    <div className="toast-wrap">
      {list.map(t => <div key={t.id} className={`toast t-${t.type}`}>{t.msg}</div>)}
    </div>
  );
}

/* ════════════════════════════════════
   TX MODAL  (add / edit)
════════════════════════════════════ */
function TxModal({ tx, coId, onDone, onClose }) {
  const isEdit = !!tx?.id;
  const [desc,    setDesc]    = React.useState(tx?.description || '');
  const [amount,  setAmount]  = React.useState(tx?.amount      || '');
  const [txType,  setTxType]  = React.useState(tx?.type        || 'income');

  const [busy,    setBusy]    = React.useState(false);
  const [err,     setErr]     = React.useState('');



  const save = async () => {
    if (!desc.trim())          { setErr('กรุณาระบุรายละเอียด'); return; }
    const amt = parseFloat(amount);
    if (!amount || isNaN(amt) || amt <= 0) { setErr('จำนวนเงินต้องมากกว่า 0'); return; }
    setBusy(true); setErr(''); setProg(0);

    const payload = { description: desc.trim(), amount: amt, type: txType };
    const { error } = isEdit
      ? await sb.from('transactions').update(payload).eq('id', tx.id)
      : await sb.from('transactions').insert([{ ...payload, company_id: coId }]);

    if (error) { setErr('บันทึกไม่สำเร็จ: ' + error.message); setBusy(false); return; }
    onDone(isEdit ? 'แก้ไขรายการสำเร็จ ✓' : 'เพิ่มรายการสำเร็จ ✓');
  };

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-box" onClick={e => e.stopPropagation()}>
        <div className="modal-title">{isEdit ? '✏️ แก้ไขรายการ' : '➕ เพิ่มรายการใหม่'}</div>

        {err && <div className="ferr">⚠️ {err}</div>}

        <div className="fg">
          <label className="fl">รายละเอียด</label>
          <input className="fi" value={desc} onChange={e=>{setDesc(e.target.value);setErr('');}} placeholder="ระบุรายละเอียด..."/>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'.7rem',marginBottom:'.9rem'}}>
          <div>
            <label className="fl">จำนวนเงิน (฿)</label>
            <input type="number" inputMode="decimal" className="fi" value={amount}
              onChange={e=>{setAmount(e.target.value);setErr('');}}
              inputMode="decimal" min="0.01" step="0.01" placeholder="0.00"/>
          </div>
          <div>
            <label className="fl">ประเภท</label>
            <select className="fi" value={txType} onChange={e=>setTxType(e.target.value)}>
              <option value="income">รายรับ (+)</option>
              <option value="expense">รายจ่าย (-)</option>
            </select>
          </div>
        </div>


        <div style={{display:'flex',gap:'.6rem',justifyContent:'flex-end'}}>
          <button className="btn btn-ghost" onClick={onClose} disabled={busy}>ยกเลิก</button>
          <button className="btn btn-green" onClick={save} disabled={busy}>
            {busy ? <><Spinner/> บันทึก...</> : (isEdit ? '💾 บันทึก' : '➕ เพิ่มรายการ')}
          </button>
        </div>
      </div>
    </div>
  );
}

                      <td style={{color:'#64748b',fontSize:'.8rem'}}>{s.phone || <span style={{color:'#e2e8f0'}}>—</span>}</td>
                      <td>
                        <span className={`pill ${s.role==='admin'?'p-in':'p-out'}`} style={{background:s.role==='admin'?'#eff6ff':'#f8fafc',color:s.role==='admin'?'#1d4ed8':'#64748b'}}>
                          {s.role==='admin'?'👑 Admin':'👤 Staff'}
                        </span>
                      </td>
                      <td style={{textAlign:'center'}}>
                        {s.id !== profile.id ? (
                          <select
                            className="fi" style={{padding:'.35rem .6rem',fontSize:'.78rem',width:'auto'}}
                            value={s.role}
                            onChange={e => handleUpdateRole(s.id, e.target.value)}
                          >
                            <option value="staff">Staff</option>
                            <option value="admin">Admin</option>
                          </select>
                        ) : (
                          <span style={{fontSize:'.75rem',color:'#94a3b8'}}>คุณเอง</span>
                        )}
                      </td>
                      <td style={{textAlign:'center'}}>
                        {s.id !== profile.id ? (
                          <button className="btn btn-sm btn-del" onClick={()=>handleRemoveStaff(s.id)}>🗑️</button>
                        ) : (
                          <span style={{fontSize:'.75rem',color:'#94a3b8'}}>—</span>
                        )}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {/* ── PAGE: MY PROFILE ── */}
      {page === 'profile' && (
        <div style={{maxWidth:520,margin:'0 auto',animation:'fadeUp .35s ease both'}}>
          <div className="panel">
            <div className="panel-title">👤 โปรไฟล์ของฉัน</div>

            {/* Profile header */}
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',marginBottom:'1.4rem',gap:'.6rem'}}>
              <div style={{width:80,height:80,borderRadius:'50%',background:'linear-gradient(135deg,#22c55e,#3b82f6)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.9rem',color:'#fff',fontWeight:700}}>
                {(profile?.full_name||profile?.email||'?')[0].toUpperCase()}
              </div>
              <div style={{textAlign:'center'}}>
                <div style={{fontWeight:700,fontSize:'1rem'}}>{profile?.full_name || 'ยังไม่ได้ตั้งชื่อ'}</div>
                <div style={{fontSize:'.78rem',color:'#94a3b8'}}>{profile?.email}</div>
                <span className="badge" style={{background:profile?.role==='admin'?'#eff6ff':'#f8fafc',color:profile?.role==='admin'?'#1d4ed8':'#64748b',marginTop:'.3rem'}}>
                  {profile?.role==='admin'?'👑 Admin':'👤 Staff'}
                </span>
              </div>
            </div>

            <div className="fg">
              <label className="fl">ชื่อ-นามสกุล</label>
              <input className="fi" placeholder="ชื่อ-นามสกุล" value={myName} onChange={e=>setMyName(e.target.value)}/>
            </div>
            <div className="fg">
              <label className="fl">เบอร์โทรศัพท์</label>
              <input className="fi" placeholder="08X-XXX-XXXX" inputMode="tel" value={myPhone} onChange={e=>setMyPhone(e.target.value)}/>
            </div>
            <div className="fg">
              <label className="fl">อีเมล</label>
              <div className="fi" style={{background:'#f8fafc',color:'#94a3b8',cursor:'not-allowed'}}>{profile?.email}</div>
            </div>
            <div className="fg">
              <label className="fl">ยศ / ตำแหน่ง</label>
              <div className="fi" style={{background:'#f8fafc',color:'#94a3b8',cursor:'not-allowed'}}>
                {profile?.role==='admin'?'👑 Admin':'👤 Staff'}
                {profile?.role==='staff' && <span style={{fontSize:'.72rem',marginLeft:'.5rem'}}>(ขอเปลี่ยนได้จาก Admin)</span>}
              </div>
            </div>
            <div className="fg">
              <label className="fl">บริษัท</label>
              <div className="fi" style={{background:'#f8fafc',color:'#64748b'}}>{company?.company_name} <span className="badge badge-amber">ID: {profile?.company_id}</span></div>
            </div>

            <button className="btn btn-green btn-w" onClick={handleSaveProfile} disabled={profBusy}>
              {profBusy ? <><Spinner/> กำลังบันทึก...</> : '💾 บันทึกโปรไฟล์'}
            </button>
          </div>
        </div>
      )}

    {/* Modals */}
    {txModal && (
      <TxModal
        tx={editTx}
        coId={profile?.company_id}
        onDone={onTxDone}
        onClose={()=>{setTxModal(false);setEditTx(null);}}
      />
    )}
    {delTx && (
      <ConfirmModal
        title="ยืนยันการลบ"
        body={`ต้องการลบรายการ "${delTx.description}" มูลค่า ฿${fmt(delTx.amount)} ใช่หรือไม่?\nจะลบสลิปออกจาก B2 ด้วย`}
        onOk={confirmDel}
        onClose={()=>setDelTx(null)}
        busy={delBusy}
      />
    )}
    {lightbox && (
      <div className="lightbox" onClick={()=>setLightbox(null)}>
        <img src={lightbox} alt="full"/>
      </div>
    )}
    <Toast list={toasts}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
